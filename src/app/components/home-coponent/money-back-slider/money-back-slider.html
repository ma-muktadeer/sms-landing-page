<section class="py-16 bg-slate-50 overflow-hidden font-sans">
  <div class="max-w-7xl mx-auto px-4 text-center">
    
    <div class="mb-12">
      <img src="c12.png" alt="Guarantee" class="w-32 h-32 mx-auto mb-6 drop-shadow-lg">
      <h2 class="text-xl md:text-2xl font-bold text-indigo-950"> মেন্টরই<span class="text-orange-500">আরপি</span> সফটওয়্যার ব্যবহার করে ৩০ দিনের মধ্যে সন্তুষ্ট না হলে,</h2>
      <h3 class="text-3xl md:text-5xl font-black text-blue-800 my-4">সম্পূর্ণ টাকা ফেরত গ্যারান্টি</h3>
      <p class="text-red-600 font-black text-xl uppercase mt-6">থার্ড পার্টির মাধ্যমে "MentorERP" সফটওয়্যারের কোন সেবা প্রদান করা হয় না</p>
    </div>

    <swiper-container 
      #swiperRef
      init="false"
      slides-per-view="1"
      space-between="20"
      loop="true"
      autoplay-delay="3000"
      autoplay-disable-on-interaction="false"
      navigation="true"
      pagination="true"
      pagination-clickable="true"
      breakpoints='{
        "640": { "slidesPerView": 2 },
        "1024": { "slidesPerView": 4 }
      }'
      class="pb-16"
    >
      @for (card of cards; track $index) {
        <swiper-slide>
          <div class="bg-white rounded-[2rem] overflow-hidden shadow-lg border border-slate-100 mx-2 hover:-translate-y-2 transition-transform duration-500">
            <img [src]="card.img" [alt]="card.title" class="w-full h-auto block">
          </div>
        </swiper-slide>
      }
    </swiper-container>

    <div class="mt-2 flex flex-col md:flex-row items-center justify-between copyright-gradient p-2 rounded-md gap-6">
      <div class="text-left flex items-center gap-4">
        <div class="bg-white/10 p-3 rounded-xl text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
          </svg>
        </div>
        <p class="text-white font-black text-2xl tracking-tighter">01688667870</p>
      </div>
      <button class="bg-orange-400 text-white px-10 py-2 rounded-2xl font-black text-lg">ফ্রি কনসালটেশন নিন</button>
    </div>

  </div>
</section>
