<section class="bg-gray-50 py-16 px-4">
  <div class="text-center mb-12">
    <h2 class="text-3xl md:text-4xl font-bold text-[#0A2E7A] inline-block relative pb-4">
     মেন্টরই<span class="text-orange-500">আরপি</span> সাপোর্টের ভিডিও সমূহ
      <span class="absolute bottom-0 left-1/2 -translate-x-1/2 w-24 h-1 bg-orange-400 rounded-full"></span>
    </h2>
  </div>

  <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
    @for (video of videos(); track video.title) {
      <div class="flex flex-col items-center">
        <div (click)="openVideo(video.videoUrl)" 
             class="relative w-full rounded-2xl overflow-hidden shadow-md aspect-video border-2 border-transparent hover:border-blue-500 transition-all duration-300 cursor-pointer group">
          
          <img [src]="video.thumbnail" class="w-full h-full object-cover" [alt]="video.title">
          
          <div class="absolute inset-0 flex items-center justify-center bg-black/10 group-hover:bg-black/40 transition-all">
            <div class="w-16 h-11 bg-red-600 rounded-xl flex items-center justify-center text-white shadow-lg transform group-hover:scale-110 transition-transform">
              <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="w-8 h-8" viewBox="0 0 16 16">
                <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
              </svg>
            </div>
          </div>
        </div>

        <div class="mt-4 text-center">
          <h3 class="text-lg font-bold text-gray-800 mb-4">{{ video.title }}</h3>
          <button (click)="openVideo(video.videoUrl)" 
                  class="inline-block bg-[#0A2E7A] hover:bg-blue-900 text-white font-medium py-2 px-8 rounded-lg transition-colors">
            Play Video
          </button>
        </div>
      </div>
    }
  </div>

  @if (selectedVideo()) {
    <div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 p-4 transition-opacity duration-300">
        <div class="absolute inset-0" (click)="closeVideo()"></div>
        
        <div class="relative w-full max-w-4xl aspect-video z-10 scale-in-center">
            <button (click)="closeVideo()" class="absolute -top-12 right-0 text-white text-3xl hover:text-red-500 transition-colors">
              বন্ধ করুন &times;
            </button>
            
            <iframe 
                class="w-full h-full rounded-xl shadow-2xl"
                [src]="safeVideoUrl" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
    </div>
  }
</section>
