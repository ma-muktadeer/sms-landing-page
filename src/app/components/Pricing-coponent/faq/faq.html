<div class="max-w-5xl mx-auto py-16 px-6 font-sans">
  <div class="text-center mb-12">
    <h2 class="text-4xl font-extrabold text-[#1e266d] tracking-tight mb-2">
      মূল্য সম্পর্কিত <span class="text-blue-600">FAQ</span>
    </h2>
    <div class="w-20 h-1.5 bg-orange-400 mx-auto rounded-full"></div>
  </div>

  <div class="grid gap-4">
    @for (item of faqs; track $index) {
      <div 
        class="group border border-[#1e266d]/30 rounded-xl transition-all duration-300 hover:shadow-lg hover:border-blue-500"
        [class.bg-blue-50]="openIndex() === $index">
        
        <button 
          (click)="toggle($index)"
          class="w-full flex justify-between items-center p-5 text-left transition-all">
          <span class="text-lg font-bold text-[#1e266d] group-hover:text-blue-700 leading-snug pr-4">
            {{ item.q }}
          </span>
          <div class="flex-shrink-0 w-8 h-8 rounded-full border border-[#1e266d]/20 flex items-center justify-center transition-transform duration-300"
               [class.rotate-45]="openIndex() === $index"
               [class.bg-blue-600]="openIndex() === $index"
               [class.text-white]="openIndex() === $index">
            <span class="text-2xl font-light">+</span>
          </div>
        </button>

        @if (openIndex() === $index) {
          <div class="px-5 pb-6 text-slate-600 leading-relaxed text-[15px] animate-slide-down">
            <div class="pt-2 border-t border-blue-200/50">
              {{ item.a }}
            </div>
          </div>
        }
      </div>
    }
  </div>
</div>
