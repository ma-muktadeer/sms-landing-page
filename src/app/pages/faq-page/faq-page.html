
<app-featuress 
bgImage ="FAQ.png"></app-featuress>
<section class="bg-gray-50 py-16">
  <div class="max-w-5xl mx-auto px-4">
    
    <h2 class="text-3xl text-center font-bold text-blue-900 mb-8 ">
      <span class="border-b-2 border-orange-400"> সাধারণ জিজ্ঞাসা (FAQ)</span>
    </h2>
    <div class="space-y-4">
      @for (faq of faqs; track $index; let i = $index) {
        <div class="border-2 border-[#3543bd] rounded-md overflow-hidden bg-white shadow-sm transition-all duration-300">
          
          <button
            (click)="toggle(i)"
            class="w-full flex justify-between items-center px-6 py-2 text-left font-bold text-[#1e266d] hover:bg-blue-50 transition-colors focus:outline-none group">
            
            <span class="text-lg">{{ faq.question }}</span>

            <span class="text-2xl transition-transform duration-300" 
                  [class.rotate-180]="activeIndex() === i">
              {{ activeIndex() === i ? '−' : '+' }}
            </span>
          </button>

          <div class="grid transition-all duration-500 ease-in-out"
               [style.grid-template-rows]="activeIndex() === i ? '1fr' : '0fr'">
            
            <div class="overflow-hidden">
              <div class="px-8 py-2 bg-white border-t border-gray-100 text-[#3342cc]">
                <ul class="space-y-3">
                  @for (line of faq.answers; track $index) {
                    <li class="flex items-start gap-3">
                      @if (faq.answers.length > 1) {
                        <span class="mt-1.5 w-2 h-2 rounded-full bg-[#1e266d] flex-shrink-0"></span>
                      }
                      <span class="text-[17px] font-medium leading-relaxed">{{ line }}</span>
                    </li>
                  }
                </ul>
              </div>
            </div>
          </div>

        </div>
      }
    </div>

  </div>
</section>

<app-slide-logo-item></app-slide-logo-item>
